name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to Lopatnov.Translate!
        For major changes, please describe your use case so we can discuss the best approach.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the need or limitation you are running into.
      placeholder: "Currently there is no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches or workarounds you have tried?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (.NET / gRPC)
        - ML / Models (NLLB, Whisper, Piper)
        - Infrastructure (Docker / CI)
        - Documentation
        - Other
    validations:
      required: true
