name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore translate.slnx

      - name: Build
        run: dotnet build translate.slnx -c Release --no-restore

      - name: Unit tests
        run: >
          dotnet test translate.slnx
          --configuration Release
          --no-build
          --filter "Category!=Integration"
          --logger "trx;LogFileName=results.trx"
          --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Tests
          path: test-results/**/*.trx
          reporter: dotnet-trx

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore translate.slnx

      - name: SonarCloud Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet-sonarscanner begin
          /k:"lopatnov_translate"
          /o:"lopatnov"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.host.url="https://sonarcloud.io"

      - name: Build
        run: dotnet build translate.slnx -c Release --no-restore

      - name: SonarCloud End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  proto-lint:
    name: Proto Lint & Breaking
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1

      - name: Buf lint
        run: buf lint

      - name: Buf breaking
        if: github.event_name == 'pull_request'
        run: |
          if git ls-remote --exit-code origin "${{ github.base_ref }}" > /dev/null 2>&1; then
            git fetch origin "${{ github.base_ref }}"
            buf breaking --against ".git#ref=FETCH_HEAD"
          else
            echo "Base branch '${{ github.base_ref }}' has no commits yet — skipping breaking check"
          fi
