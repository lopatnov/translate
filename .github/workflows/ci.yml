name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore translate.slnx

      - name: Build
        run: dotnet build translate.slnx -c Release --no-restore

      - name: Unit tests
        run: >
          dotnet test translate.slnx
          --configuration Release
          --no-build
          --filter "Category!=Integration"
          --logger "trx;LogFileName=results.trx"
          --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Tests
          path: test-results/**/*.trx
          reporter: dotnet-trx

  proto-lint:
    name: Proto Lint & Breaking
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1

      - name: Buf lint
        run: buf lint

      - name: Buf breaking
        if: github.event_name == 'pull_request'
        run: |
          if git ls-remote --exit-code origin "${{ github.base_ref }}" > /dev/null 2>&1; then
            git fetch origin "${{ github.base_ref }}"
            buf breaking --against ".git#branch=${{ github.base_ref }}"
          else
            echo "Base branch '${{ github.base_ref }}' has no commits yet — skipping breaking check"
          fi
