services:
  translate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: lopatnov/translate:latest
    ports:
      - "5100:5100"
    volumes:
      - ../models:/app/models:ro
    environment:
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - DOTNET_NOLOGO=1
      - Models__Nllb__Path=/app/models/nllb
      - LibreTranslate__BaseUrl=http://libretranslate:5000
    depends_on:
      - libretranslate
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "5000:5000"
    environment:
      # Load only the languages declared in Language.cs to reduce startup time and memory.
      - LT_LOAD_ONLY=en,uk,ru,de,fr,es,pl,zh,ja,ar
    restart: unless-stopped
