services:
  translate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: lopatnov/translate:latest
    ports:
      - "5100:5100"
    volumes:
      - ../models:/app/models:ro
    environment:
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - DOTNET_NOLOGO=1
      - Models__Nllb__Path=/app/models/nllb
      - LibreTranslate__BaseUrl=http://libretranslate:5000
    depends_on:
      libretranslate:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8g    # NLLB 600M float32 ~4 GB; 1.3B ~8 GB
          cpus: '2.0'

  libretranslate:
    image: libretranslate/libretranslate:v1.9.5
    ports:
      - "5000:5000"
    environment:
      # Load only the languages declared in Language.cs to reduce startup time and memory.
      - LT_LOAD_ONLY=en,uk,ru,de,fr,es,pl,zh,ja,ar
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/languages || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g    # ~300 MB per language; 10 languages ~3 GB
          cpus: '1.0'
