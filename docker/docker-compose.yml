services:
  translate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: lopatnov/translate:latest
    ports:
      - "5100:5100"
    volumes:
      - ../models:/app/models:ro
      - ../src/Lopatnov.Translate.Grpc/appsettings.json:/app/src/Lopatnov.Translate.Grpc/appsettings.json:ro
    environment:
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - DOTNET_NOLOGO=1
    # depends_on:
    #   libretranslate:
    #     condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8g    # NLLB 600M ~4 GB; M2M-100 418M ~2 GB; Whisper small ~1 GB, medium ~3 GB
          cpus: '2.0'

